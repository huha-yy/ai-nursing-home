{% extends "base.html" %}
{% block title %}{{ t("auth.pw.title") }}{% endblock %}
{% block body %}
<div class="auth-card">
  <h1 class="auth-mark">{{ t("auth.pw.heading") }}</h1>
  <p class="auth-sub">{{ t("auth.pw.sub") }}</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/password-change" class="stacked-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>{{ t("auth.pw.current") }}
      <input type="password" name="current_password"
             autocomplete="current-password" required></label>
    <label>{{ t("auth.pw.new") }}
      <input type="password" name="new_password" minlength="8"
             autocomplete="new-password" required></label>
    <label>{{ t("auth.pw.confirm") }}
      <input type="password" name="new_password_confirm" minlength="8"
             autocomplete="new-password" required></label>
    <button type="submit" class="primary-btn">{{ t("auth.pw.submit") }}</button>
  </form>
</div>
{% endblock %}
