{% extends "base.html" %}
{% block title %}{{ t("auth.title") }}{% endblock %}
{% block body %}
<div class="auth-card">
  <h1 class="auth-mark">dato</h1>
  <p class="auth-sub">{{ t("auth.signin_heading") }}</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login" class="stacked-form">
    <label>{{ t("auth.username") }}
      <input type="text" name="username" autocomplete="username"
             pattern="[A-Za-z0-9_]{1,32}" required autofocus>
    </label>
    <label>{{ t("auth.password") }}
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit" class="primary-btn">{{ t("auth.signin") }}</button>
  </form>
</div>
{% endblock %}
