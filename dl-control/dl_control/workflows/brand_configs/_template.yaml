# _template — 新品牌配置模板
# 复制此文件为 <brand>.yaml，填写字段即可。

name: {品牌全称}
brand_short: {品牌简称/核心品牌名}

# 赛道/监控领域关键词（relevance-judge 和 hotspot-monitor 使用）
sector: {赛道关键词，逗号分隔}

# 内容使命（content-strategy 和 wechat-content 使用）
mission: |
  核心使命：每一篇内容的终点不是"行业分析"，
  而是"{品牌}如何在这个议题中提供价值"。
  从热点出发，经过行业洞察，最终落到{品牌}和具体产品/服务。

# 公众号发布规则（wechat-content 使用）
wechat_rule: 必须包含至少一个品牌段落（brand_section=true），文末附加品牌信息块（公司名、定位、资质）。

# 小红书标签（xhs-content 使用）
xhs_tags: "#{标签1} #{标签2}"

# 品牌连接点描述（content-strategy 使用）
brand_bridge: 品牌连接点（热点→{品牌}品牌连接点，不可跳过）

# 合规检查补充项（compliance-check 使用）
compliance_extra: 额外检查：品牌段是否存在、产品名是否出现、品牌标签是否齐全。

# 产品名称列表（在产品图插入等场景使用）
product_names:
  - {产品1}
  - {产品2}

# 品牌资产文件名（位于 configs/<brand>/brand_assets/，为空数组则跳过）
brand_assets: []

# 产品资产映射: [源文件名, 输出目标名, 产品名] 的列表
product_assets: []

# 产品关键词映射: 产品名 → 触发关键词列表
product_keywords: {}
